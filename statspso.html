<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistiques de Participation</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=DM+Sans:wght@400;500;700&display=swap');
        
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #161b2e;
            --bg-card: #1e2538;
            --accent-1: #ff6b35;
            --accent-2: #f7931e;
            --accent-3: #ffd23f;
            --text-primary: #e8eaed;
            --text-secondary: #9ca3af;
            --border: #2d3548;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(255, 107, 53, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(247, 147, 30, 0.06) 0%, transparent 50%);
        }
        
        .header {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-card) 100%);
            padding: 3rem 2rem;
            border-bottom: 2px solid var(--border);
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--accent-1) 0%, transparent 70%);
            opacity: 0.1;
            animation: pulse 8s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.1; }
            50% { transform: scale(1.2); opacity: 0.15; }
        }
        
        h1 {
            font-family: 'Fraunces', serif;
            font-size: 3.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2), var(--accent-3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            position: relative;
        }
        
        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-style: italic;
            position: relative;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .nav {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            background: var(--bg-primary);
            padding: 1rem 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }
        
        .nav-btn {
            padding: 0.8rem 1.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            cursor: pointer;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .nav-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 107, 53, 0.2), transparent);
            transition: left 0.5s;
        }
        
        .nav-btn:hover::before {
            left: 100%;
        }
        
        .nav-btn:hover {
            background: var(--bg-secondary);
            border-color: var(--accent-1);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.2);
        }
        
        .nav-btn.active {
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            border-color: var(--accent-1);
            color: white;
            font-weight: 600;
        }
        
        .section {
            display: none;
            animation: fadeIn 0.5s ease-out;
        }
        
        .section.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2), var(--accent-3));
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(255, 107, 53, 0.15);
            border-color: var(--accent-1);
        }
        
        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        
        .stat-value {
            font-family: 'Fraunces', serif;
            font-size: 2.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .chart-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            position: relative;
        }
        
        .chart-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2), var(--accent-3));
        }
        
        .chart-title {
            font-family: 'Fraunces', serif;
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }
        
        .period-select {
            margin-bottom: 2rem;
        }
        
        select {
            width: 100%;
            padding: 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        select:hover, select:focus {
            border-color: var(--accent-1);
            outline: none;
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }
        
        .no-data {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
            font-style: italic;
        }
        
        canvas {
            max-height: 400px;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            
            .nav {
                position: static;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <h1>Tableau de Bord</h1>
            <p class="subtitle">Analyse des présences et statistiques</p>
        </div>
    </div>
    
    <div class="container">
        <div class="nav">
            <button class="nav-btn active" onclick="showSection('global')">Vue Globale</button>
            <button class="nav-btn" onclick="showSection('periods')">Par Période</button>
        </div>
        
        <!-- Section Globale -->
        <div id="global" class="section active">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Total Individus</div>
                    <div class="stat-value" id="total-individus">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Présences Totales</div>
                    <div class="stat-value" id="total-presences">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Moyenne Participation</div>
                    <div class="stat-value" id="moyenne-participation">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Médiane Participation</div>
                    <div class="stat-value" id="mediane-participation">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Participation Max</div>
                    <div class="stat-value" id="max-participation">-</div>
                </div>
            </div>
            
            <div class="chart-container">
                <h3 class="chart-title">Répartition Filles / Garçons (Global)</h3>
                <canvas id="chart-genre-global"></canvas>
            </div>
            
            <div class="chart-container">
                <h3 class="chart-title">Années de Naissance (Global)</h3>
                <canvas id="chart-annees-global"></canvas>
            </div>
            
            <div class="chart-container">
                <h3 class="chart-title">Quotient Familial (Global)</h3>
                <canvas id="chart-quotient-global"></canvas>
            </div>
            
            <div class="chart-container">
                <h3 class="chart-title">Communes (Global)</h3>
                <canvas id="chart-villes-global"></canvas>
            </div>
        </div>
        
        <!-- Section Par Période -->
        <div id="periods" class="section">
            <div class="period-select">
                <select id="period-selector" onchange="updatePeriodStats()">
                    <option value="">Sélectionnez une période</option>
                </select>
            </div>
            
            <div id="period-stats"></div>
        </div>
    </div>
    
    <script>
        // Données intégrées directement dans le HTML
        const appData = {"metadata": {"total_individus": 105, "total_presences": 1092, "genres": {"M": 64, "F": 41}, "villes": {"L'ARBRESLE": 57, "BULLY": 24, "SAIN-BEL": 6, "LENTILLY": 3, "SAVIGNY": 3, "TARARE": 2, "SAINT-GERMAIN-NUELLES": 2, "SAINT-JULIEN-SUR-BIBOST": 2, "BESSENAY": 1, "BELLEVILLE-EN-BEAUJOLAIS": 1, "VILLEURBANNE": 1, "SAINT-ROMAIN-DE-POPEY": 1, "ÉVEUX": 1, "CHÂTILLON": 1}, "quotients": {">2001": 30, "1501-1750": 11, "381-540": 10, "901-1000": 10, "781-900": 9, "1001-1100": 8, "1751-2000": 7, "1301-1400": 5, "661-780": 5, "1401-1500": 4, "1201-1300": 2, "<380": 2, "1101-1200": 1, "541-660": 1}, "annees_naissance": {"2013": 30, "2012": 28, "2011": 20, "2010": 13, "2014": 10, "2015": 1, "2009": 1, "2007": 1, "2008": 1}}, "periodes": ["Hiver Arbresle", "Hiver BSGN", "Séjour Hiver", "Printemps Arbresle", "Printemps BSGN", "Été Arbresle", "Été BSGN", "Automne Arbresle", "Automne BSGN", "Séjour Été", "Mercredis 24-25", "Mercredis 25-26"], "stats_par_periode": {"Hiver Arbresle": {"total_participants": 22, "total_presences": 126, "genre": {"M": 18, "F": 4}, "annees_naissance": {"2012": 8, "2011": 5, "2010": 3, "2013": 3, "2009": 1, "2007": 1, "2008": 1}, "quotients": {"381-540": 5, "1501-1750": 3, ">2001": 3, "781-900": 3, "901-1000": 2, "1101-1200": 1, "1301-1400": 1, "661-780": 1, "1751-2000": 1, "1201-1300": 1, "<380": 1}, "villes": {"L'ARBRESLE": 17, "SAIN-BEL": 2, "BESSENAY": 1, "BELLEVILLE-EN-BEAUJOLAIS": 1, "ÉVEUX": 1}}, "Hiver BSGN": {"total_participants": 10, "total_presences": 34, "genre": {"M": 6, "F": 4}, "annees_naissance": {"2012": 4, "2011": 3, "2010": 2, "2013": 1}, "quotients": {">2001": 6, "1501-1750": 2, "1001-1100": 1, "1301-1400": 1}, "villes": {"BULLY": 8, "SAINT-GERMAIN-NUELLES": 2}}, "Séjour Hiver": {"total_participants": 13, "total_presences": 65, "genre": {"F": 7, "M": 6}, "annees_naissance": {"2012": 7, "2013": 5, "2011": 1}, "quotients": {"901-1000": 4, ">2001": 2, "1751-2000": 2, "1001-1100": 2, "781-900": 1, "1401-1500": 1, "381-540": 1}, "villes": {"L'ARBRESLE": 8, "SAVIGNY": 3, "BULLY": 1, "SAINT-JULIEN-SUR-BIBOST": 1}}, "Printemps Arbresle": {"total_participants": 33, "total_presences": 91, "genre": {"M": 21, "F": 12}, "annees_naissance": {"2012": 14, "2013": 9, "2011": 6, "2010": 3, "2014": 1}, "quotients": {"901-1000": 7, "1501-1750": 6, ">2001": 4, "1001-1100": 4, "381-540": 4, "781-900": 3, "1751-2000": 2, "1101-1200": 1, "1301-1400": 1, "1401-1500": 1}, "villes": {"L'ARBRESLE": 23, "LENTILLY": 2, "TARARE": 2, "SAVIGNY": 2, "BESSENAY": 1, "SAIN-BEL": 1, "BELLEVILLE-EN-BEAUJOLAIS": 1, "ÉVEUX": 1}}, "Printemps BSGN": {"total_participants": 8, "total_presences": 18, "genre": {"M": 4, "F": 4}, "annees_naissance": {"2012": 3, "2011": 2, "2013": 2, "2010": 1}, "quotients": {">2001": 5, "1401-1500": 1, "1301-1400": 1, "1751-2000": 1}, "villes": {"BULLY": 7, "SAINT-GERMAIN-NUELLES": 1}}, "Été Arbresle": {"total_participants": 30, "total_presences": 205, "genre": {"M": 24, "F": 6}, "annees_naissance": {"2012": 11, "2013": 7, "2011": 6, "2014": 5, "2010": 1}, "quotients": {"381-540": 7, "901-1000": 4, "1501-1750": 4, "661-780": 3, "781-900": 3, "1001-1100": 2, ">2001": 2, "1751-2000": 2, "1101-1200": 1, "1301-1400": 1, "<380": 1}, "villes": {"L'ARBRESLE": 22, "SAIN-BEL": 4, "BESSENAY": 1, "BELLEVILLE-EN-BEAUJOLAIS": 1, "ÉVEUX": 1, "SAINT-JULIEN-SUR-BIBOST": 1}}, "Été BSGN": {"total_participants": 17, "total_presences": 68, "genre": {"F": 11, "M": 6}, "annees_naissance": {"2013": 5, "2012": 4, "2011": 3, "2014": 2, "2010": 2, "2015": 1}, "quotients": {">2001": 8, "1501-1750": 3, "1751-2000": 2, "1001-1100": 2, "1401-1500": 1, "1301-1400": 1}, "villes": {"BULLY": 14, "SAINT-GERMAIN-NUELLES": 2, "VILLEURBANNE": 1}}, "Automne Arbresle": {"total_participants": 22, "total_presences": 101, "genre": {"M": 12, "F": 10}, "annees_naissance": {"2012": 8, "2013": 6, "2011": 4, "2014": 4}, "quotients": {"901-1000": 5, "1501-1750": 3, "1751-2000": 3, "781-900": 3, "381-540": 2, "1301-1400": 2, ">2001": 2, "1101-1200": 1, "1401-1500": 1}, "villes": {"L'ARBRESLE": 17, "BESSENAY": 1, "SAIN-BEL": 1, "SAVIGNY": 1, "ÉVEUX": 1, "SAINT-JULIEN-SUR-BIBOST": 1}}, "Automne BSGN": {"total_participants": 12, "total_presences": 33, "genre": {"F": 8, "M": 4}, "annees_naissance": {"2013": 8, "2014": 2, "2012": 2}, "quotients": {">2001": 7, "1751-2000": 2, "1401-1500": 1, "1501-1750": 1, "1301-1400": 1}, "villes": {"BULLY": 11, "SAINT-GERMAIN-NUELLES": 1}}, "Séjour Été": {"total_participants": 16, "total_presences": 80, "genre": {"M": 12, "F": 4}, "annees_naissance": {"2012": 6, "2011": 4, "2010": 3, "2009": 1, "2013": 1, "2008": 1}, "quotients": {">2001": 5, "901-1000": 3, "1001-1100": 2, "1751-2000": 2, "781-900": 2, "661-780": 1, "381-540": 1}, "villes": {"L'ARBRESLE": 9, "SAIN-BEL": 2, "SAVIGNY": 2, "LENTILLY": 1, "ÉVEUX": 1, "CHÂTILLON": 1}}, "Mercredis 24-25": {"total_participants": 22, "total_presences": 182, "genre": {"M": 20, "F": 2}, "annees_naissance": {"2012": 9, "2013": 6, "2011": 4, "2010": 1, "2014": 1, "2008": 1}, "quotients": {"1001-1100": 3, "381-540": 3, "1751-2000": 2, "781-900": 2, "1401-1500": 2, ">2001": 2, "<380": 2, "901-1000": 2, "661-780": 1, "541-660": 1, "1201-1300": 1, "1501-1750": 1}, "villes": {"L'ARBRESLE": 19, "SAINT-ROMAIN-DE-POPEY": 1, "ÉVEUX": 1, "SAIN-BEL": 1}}, "Mercredis 25-26": {"total_participants": 9, "total_presences": 89, "genre": {"M": 6, "F": 3}, "annees_naissance": {"2012": 4, "2011": 2, "2013": 2, "2014": 1}, "quotients": {"901-1000": 3, ">2001": 2, "1001-1100": 1, "1201-1300": 1, "1751-2000": 1, "1501-1750": 1}, "villes": {"L'ARBRESLE": 6, "SAINT-ROMAIN-DE-POPEY": 1, "BULLY": 1, "ÉVEUX": 1}}}, "stats_globales": {"moyenne_participation": 10.4, "mediane_participation": 6.0, "min_participation": 1, "max_participation": 63}};
        
        // Initialiser l'app directement
        initApp();
        
        function initApp() {
            // Stats globales
            document.getElementById('total-individus').textContent = appData.metadata.total_individus;
            document.getElementById('total-presences').textContent = appData.metadata.total_presences;
            document.getElementById('moyenne-participation').textContent = appData.stats_globales.moyenne_participation.toFixed(1);
            document.getElementById('mediane-participation').textContent = appData.stats_globales.mediane_participation.toFixed(1);
            document.getElementById('max-participation').textContent = appData.stats_globales.max_participation;
            
            // Charts globaux
            createPieChart('chart-genre-global', appData.metadata.genres, ['#ff6b35', '#f7931e']);
            createBarChart('chart-annees-global', appData.metadata.annees_naissance);
            createBarChart('chart-quotient-global', appData.metadata.quotients);
            createBarChart('chart-villes-global', appData.metadata.villes);
            
            // Remplir le sélecteur de périodes
            const selector = document.getElementById('period-selector');
            appData.periodes.forEach(period => {
                const option = document.createElement('option');
                option.value = period;
                option.textContent = period;
                selector.appendChild(option);
            });
        }
        
        function createPieChart(canvasId, data, colors) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(data),
                    datasets: [{
                        data: Object.values(data),
                        backgroundColor: colors || ['#ff6b35', '#f7931e', '#ffd23f'],
                        borderWidth: 2,
                        borderColor: '#1e2538'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: '#e8eaed',
                                padding: 20,
                                font: { size: 14, family: 'DM Sans' }
                            }
                        }
                    }
                }
            });
        }
        
        function createBarChart(canvasId, data) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            
            // Ordre personnalisé pour les quotients
            const quotientOrder = ['<380', '381-540', '541-660', '661-780', '781-900', '901-1000', '1001-1100', '1101-1200', '1201-1300', '1301-1400', '1401-1500', '1501-1750', '1751-2000', '>2001'];
            
            let sortedData;
            const keys = Object.keys(data);
            
            // Vérifier si ce sont des quotients en testant si au moins une clé est dans quotientOrder
            const isQuotient = keys.some(k => quotientOrder.includes(k));
            
            if (isQuotient) {
                // Trier selon l'ordre des quotients
                sortedData = quotientOrder
                    .filter(q => data[q] !== undefined)
                    .map(q => [q, data[q]]);
            } else if (keys.every(k => !isNaN(k))) {
                // Trier numériquement pour les années
                sortedData = Object.entries(data).sort((a, b) => a[0] - b[0]);
            } else {
                // Pour les villes, trier par valeur décroissante
                sortedData = Object.entries(data).sort((a, b) => b[1] - a[1]);
            }
            
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sortedData.map(d => d[0]),
                    datasets: [{
                        label: 'Nombre',
                        data: sortedData.map(d => d[1]),
                        backgroundColor: 'rgba(255, 107, 53, 0.8)',
                        borderColor: '#ff6b35',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { color: '#9ca3af', font: { family: 'DM Sans' } },
                            grid: { color: '#2d3548' }
                        },
                        x: {
                            ticks: { color: '#9ca3af', font: { family: 'DM Sans' } },
                            grid: { color: '#2d3548' }
                        }
                    }
                }
            });
        }
        
        function updatePeriodStats() {
            const period = document.getElementById('period-selector').value;
            if (!period) return;
            
            const stats = appData.stats_par_periode[period];
            const container = document.getElementById('period-stats');
            
            if (stats.total_participants === 0) {
                container.innerHTML = '<div class="no-data">Aucun participant pour cette période</div>';
                return;
            }
            
            container.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Participants</div>
                        <div class="stat-value">${stats.total_participants}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Présences</div>
                        <div class="stat-value">${stats.total_presences}</div>
                    </div>
                </div>
                
                <div class="chart-container">
                    <h3 class="chart-title">Répartition Filles / Garçons</h3>
                    <canvas id="chart-genre-period"></canvas>
                </div>
                
                <div class="chart-container">
                    <h3 class="chart-title">Années de Naissance</h3>
                    <canvas id="chart-annees-period"></canvas>
                </div>
                
                <div class="chart-container">
                    <h3 class="chart-title">Quotient Familial</h3>
                    <canvas id="chart-quotient-period"></canvas>
                </div>
                
                <div class="chart-container">
                    <h3 class="chart-title">Communes</h3>
                    <canvas id="chart-villes-period"></canvas>
                </div>
            `;
            
            setTimeout(() => {
                createPieChart('chart-genre-period', stats.genre, ['#ff6b35', '#f7931e']);
                createBarChart('chart-annees-period', stats.annees_naissance);
                createBarChart('chart-quotient-period', stats.quotients);
                createBarChart('chart-villes-period', stats.villes);
            }, 100);
        }
        
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(sectionId).classList.add('active');
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
